<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>数字カウントアプリ</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --text: #172033;
        --muted: #6a7280;
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --danger: #dc2626;
        --line: #d9e0ea;
        --shadow: 0 18px 45px rgba(23, 32, 51, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(135deg, rgba(37, 99, 235, 0.12), transparent 38%),
          linear-gradient(315deg, rgba(22, 163, 74, 0.12), transparent 34%),
          var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(100%, 420px);
        background: var(--panel);
        border: 1px solid rgba(217, 224, 234, 0.9);
        border-radius: 8px;
        box-shadow: var(--shadow);
        padding: 24px;
      }

      .app-title {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
      }

      .save-state {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .counter-display {
        margin: 28px 0;
        min-height: 140px;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcff;
      }

      #count {
        max-width: 100%;
        padding: 0 12px;
        overflow-wrap: anywhere;
        font-size: clamp(4rem, 24vw, 7rem);
        font-weight: 800;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }

      .main-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      button {
        min-height: 64px;
        border: 0;
        border-radius: 8px;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        touch-action: manipulation;
      }

      button:focus-visible {
        outline: 3px solid rgba(37, 99, 235, 0.35);
        outline-offset: 3px;
      }

      .count-button {
        background: var(--primary);
        color: white;
        font-size: 2rem;
      }

      .count-button:hover {
        background: var(--primary-dark);
      }

      .minus {
        background: #334155;
      }

      .minus:hover {
        background: #1f2937;
      }

      .sub-actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: 12px;
      }

      .reset-button {
        background: #fff;
        color: var(--danger);
        border: 1px solid #fecaca;
      }

      .reset-button:hover {
        background: #fff5f5;
      }

      .hint {
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 0.86rem;
        line-height: 1.6;
      }

      @media (max-width: 380px) {
        body {
          padding: 14px;
        }

        main {
          padding: 18px;
        }

        button {
          min-height: 60px;
        }
      }
    </style>
  </head>
  <body>
    <main aria-labelledby="app-title">
      <h1 class="app-title" id="app-title">数字カウントアプリ</h1>
      <p class="save-state" id="save-state">保存済み</p>

      <section class="counter-display" aria-live="polite" aria-label="現在のカウント">
        <div id="count">0</div>
      </section>

      <div class="main-actions">
        <button class="count-button minus" id="minus-button" type="button" aria-label="1減らす">
          -1
        </button>
        <button class="count-button" id="plus-button" type="button" aria-label="1増やす">
          +1
        </button>
      </div>

      <div class="sub-actions">
        <button class="reset-button" id="reset-button" type="button">リセット</button>
      </div>

      <p class="hint">数字はこのブラウザに自動保存されます。ページを閉じても、次に開いたときに続きから使えます。</p>
    </main>

    <script>
      const storageKey = "simple-counter-value";
      const countElement = document.querySelector("#count");
      const saveStateElement = document.querySelector("#save-state");
      const plusButton = document.querySelector("#plus-button");
      const minusButton = document.querySelector("#minus-button");
      const resetButton = document.querySelector("#reset-button");

      let count = Number(localStorage.getItem(storageKey) || 0);

      function updateDisplay() {
        countElement.textContent = count;
        localStorage.setItem(storageKey, String(count));
        saveStateElement.textContent = "保存済み";
      }

      plusButton.addEventListener("click", () => {
        count += 1;
        updateDisplay();
      });

      minusButton.addEventListener("click", () => {
        count -= 1;
        updateDisplay();
      });

      resetButton.addEventListener("click", () => {
        const shouldReset = confirm("カウントを0に戻しますか？");

        if (shouldReset) {
          count = 0;
          updateDisplay();
        }
      });

      updateDisplay();
    </script>
  </body>
</html>
